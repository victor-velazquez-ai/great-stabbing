name: Adapter — Annual (DE, IT)

on:
  schedule:
    # 5th of May, 06:00 UTC. BKA publishes PKS in late April/early May.
    - cron: "0 6 5 5 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - run: uv sync

      - run: uv run python scripts/run_adapter.py DE IT
        continue-on-error: true

      - name: Commit Parquet updates
        run: |
          git config user.name "great-stabbing-bot"
          git config user.email "bot@great-stabbing.local"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "chore(data): annual DE+IT refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no data changes"
          fi
