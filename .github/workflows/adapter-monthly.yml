name: Adapter — Monthly (UK, FR)

on:
  schedule:
    # 5th of each month, 06:00 UTC. UK + FR publish around the 3rd–10th.
    - cron: "0 6 5 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - run: uv sync

      - name: Run UK adapter
        run: uv run python scripts/run_adapter.py UK
        continue-on-error: true

      - name: Run FR adapter
        run: uv run python scripts/run_adapter.py FR
        continue-on-error: true

      - name: Commit Parquet updates
        run: |
          git config user.name "great-stabbing-bot"
          git config user.email "bot@great-stabbing.local"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "chore(data): monthly UK+FR refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no data changes"
          fi
