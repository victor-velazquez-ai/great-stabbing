name: Source URL health check

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays at noon UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - run: uv sync

      - name: Check sources
        id: check
        run: uv run python scripts/check_sources.py
        continue-on-error: true

      - name: Open issue on failure
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Source URL health check failed (${new Date().toISOString().split('T')[0]})`;
            const body = `One or more of our upstream sources returned a non-2xx status.\n\nSee the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for the specific URLs and codes.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title, body,
              labels: ['source-health'],
            });
