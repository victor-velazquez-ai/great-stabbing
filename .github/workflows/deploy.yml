name: Deploy site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/parquet/**"
      - "data/tiles/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Copy data + tiles into site/public
        run: |
          mkdir -p site/public/data site/public/tiles
          if [ -d data/parquet ]; then cp -r data/parquet/* site/public/data/ 2>/dev/null || true; fi
          if [ -d data/tiles ]; then cp -r data/tiles/* site/public/tiles/ 2>/dev/null || true; fi

      - name: Install and build
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=great-stabbing --branch=main
