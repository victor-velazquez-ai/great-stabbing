# ISTAT (Italian National Statistical Institute) — *Delitti denunciati dalle
# forze di polizia all'autorità giudiziaria* (crimes reported to judicial
# authority by police forces). Annual statistics.
#
# Foreign-background published? Partial — ISTAT publishes a "Nazionalità"
# (nationality) dimension on some tables but not all. For MVP we emit only
# suspect_dim="total" rows; the foreign breakdown comes in a follow-up.

mapping:
  # ISTAT SDMX TYPE_CRIME codes (confirmed in dataflow
  # 73_230_DF_DCCV_AUTVITTPS_6, dimension TYPE_CRIME).
  "INTENHOM": homicide
  "BLOWS": assault_serious
  "RAPE": sexual_assault
  # STALK = stalking; not a violent bodily-harm category in our schema.

skip:
  - "STALK"

notes: |
  Source: ISTAT SDMX REST API, dataflow 73_230_DF_DCCV_AUTVITTPS_6
  ("Violent crimes, age - regions / Delitti violenti, sesso, età - reg").

  Dimensions used:
    DATA_TYPE = VICTIM    (per-victim count, comparable with UK ONS and FR Interstats)
    AGE = TOTAL           (collapse age bands)
    CITIZENSHIP = TOTAL   (this dataflow only carries TOTAL — the by-citizenship
                           breakdown lives in dataflow 73_230_DF_DCCV_AUTVITTPS_5
                           "Violent crimes, age, citizenship" which is a future
                           upgrade for the foreign-background dimension)
    COUNTRY_CITIZEN = WORLD
    SEX = 1 + 2 (sum)     (no "TOTAL" code in this dataflow)
    REF_AREA filtered to NUTS-2 (4-char codes ITC1..ITG2 matching region_map.csv).

  Coverage: annual, 2007–latest (currently 2024).
